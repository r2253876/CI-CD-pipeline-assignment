# SonarQube project configuration, read by the sonar-scanner CLI stage in
# the Jenkinsfile. Lives at repo root (not app/) so future non-JS
# components (Terraform, Helm) could be added as additional modules later
# without moving this file.

sonar.projectKey=devops-sample-api
sonar.projectName=devops-sample-api
sonar.projectVersion=1.0

# Source/test layout
sonar.sources=app
sonar.exclusions=app/node_modules/**,app/test/**
sonar.tests=app/test
sonar.test.inclusions=app/test/**/*.test.js

# Node/JS analysis
sonar.sourceEncoding=UTF-8
sonar.javascript.node.maxspace=4096

# Quality Gate — the Jenkinsfile's waitForQualityGate step polls THIS
# project's gate status via the SonarQube webhook (configured once, by
# hand, in the SonarQube UI: Administration > Webhooks > add
# http://<jenkins_public_ip>:8080/sonarqube-webhook/). The gate itself
# ("Sonar way" by default, or a custom one — see the runbook) is what
# actually fails the build, not this file.
