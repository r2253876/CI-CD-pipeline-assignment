{{- if and .Values.secret.create (not .Values.secret.externalSecrets.enabled) }}
# "Mocked" secret for local/dev use — a plain Kubernetes Secret.
# In real dev/staging/prod AWS deployments, set secret.externalSecrets.enabled=true
# instead: the External Secrets Operator will create/manage this Secret object
# by syncing from AWS Secrets Manager / SSM Parameter Store, and this template
# is skipped entirely. See README "Secrets & Config".
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "devops-sample-api.fullname" . }}-secret
  labels:
    {{- include "devops-sample-api.labels" . | nindent 4 }}
type: Opaque
stringData:
  API_KEY: {{ .Values.secret.apiKey | quote }}
{{- end }}
{{- if .Values.secret.externalSecrets.enabled }}
---
# Requires the External Secrets Operator (https://external-secrets.io) to be
# installed on the cluster, with a SecretStore/ClusterSecretStore named
# `{{ .Values.secret.externalSecrets.secretStoreRef }}` pointing at AWS
# Secrets Manager (auth typically via IRSA).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "devops-sample-api.fullname" . }}-external-secret
  labels:
    {{- include "devops-sample-api.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.secret.externalSecrets.secretStoreRef }}
    kind: ClusterSecretStore
  target:
    name: {{ include "devops-sample-api.fullname" . }}-secret
    creationPolicy: Owner
  data:
    - secretKey: API_KEY
      remoteRef:
        key: {{ .Values.secret.externalSecrets.remoteRefKey }}
{{- end }}
